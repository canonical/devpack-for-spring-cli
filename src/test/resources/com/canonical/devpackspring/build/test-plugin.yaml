checkStyle:
  gradle:
    id: checkstyle
    version: 1.0.0
    repository: gradlePluginPortal()
    default-task: check
    tasks:
      - check
  maven:
    id: org.apache.maven.plugins:maven-checkstyle-plugin
    version: 3.6.0
    default-task: check
    tasks:
      - checkstyle:check
    configuration:
      resources:
        - path: checkstyle.xml
          content: |
            <?xml version="1.0"?>
            <!DOCTYPE module PUBLIC "-//Checkstyle//DTD Checkstyle Configuration 1.3//EN" "https://checkstyle.org/dtds/configuration_1_3.dtd">
            <module name="Checker">
            </module>
      maven:
        configuration: |
          <configuration>
            <configLocation>${project.basedir}/checkstyle.xml</configLocation>
          </configuration>
        dependencies: |
          <dependencies>
          <dependency>
            <groupId>com.puppycrawl.tools</groupId>
            <artifactId>checkstyle</artifactId>
            <version>10.21.1</version>
          </dependency>
          </dependencies>
        executions: |
          <executions>
          <execution>
            <id>checkstyle</id>
            <phase>validate</phase>
            <goals>
              <goal>check</goal>
            </goals>
          </execution>
          </executions>
rockcraft:
  gradle:
    id: io.github.rockcrafters.rockcraft
    version: 1.0.0
    build-system: gradle
    classpath: io.github.rockcrafters.rockcraft:io.github.rockcrafters.rockcraft.gradle.plugin:1.0.0
    class-name: com.canonical.rockcraft.gradle.RockcraftPlugin
    repository: gradlePluginPortal()
    default-task: build-rock
    tasks:
      - create-rock
      - build-rock
      - create-build-rock
      - build-build-rock
      - push-rock
      - push-build-rock
    description: |
      This is a plugin description
    configuration:
      resources:
        - path: .config/config.xml
          content: |
            <resource/>
      maven:
        configuration: |
          <maven-element-config/>
        dependencies: |
          <dependencies/>
        executions: |
          <executions/>
      gradleKotlin: |
        configure<com.canonical.rockcraft.builder.RockcraftOptions> {
            setTargetRelease(21)
        }
      gradleGroovy: |
        groovyDslObject {
        }
